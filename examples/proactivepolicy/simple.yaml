---
apiVersion: rightsizing.kubex.ai/v1alpha1
kind: AutomationStrategy
metadata:
  name: sample-automation-strategy
  namespace: default
spec:
  podEviction:
    enabled: true
---
apiVersion: rightsizing.kubex.ai/v1alpha1
kind: ProactivePolicy
metadata:
  name: sample-proactive-policy
  namespace: default
spec:
  scope:
    labelSelector:
      matchLabels:
        app: rightsizing-demo
  automationStrategyRef:
    name: sample-automation-strategy
  safetyChecks:
    maxAnalysisAgeDays: 365
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rightsizing-demo
  namespace: default
  labels:
    app: rightsizing-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rightsizing-demo
  template:
    metadata:
      labels:
        app: rightsizing-demo
    spec:
      containers:
        - name: demo
          image: busybox:1.36
          command: ["sleep", "3600"]
