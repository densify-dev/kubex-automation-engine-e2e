---
apiVersion: rightsizing.kubex.ai/v1alpha1
kind: AutomationStrategy
metadata:
  name: enablement-directions
  namespace: default
spec:
  enablement:
    cpu:
      requests:
        # allow only CPU request upsizes; block downsizes and set-from-unspecified.
        downsize: false
        upsize: true
        setFromUnspecified: false
      limits:
        # allow only CPU limit downsizes; allow set-from-unspecified.
        downsize: true
        upsize: false
        setFromUnspecified: true
    memory:
      requests:
        # allow only memory request downsizes; allow set-from-unspecified.
        downsize: true
        upsize: false
        setFromUnspecified: true
      limits:
        # allow only memory limit upsizes; block set-from-unspecified.
        downsize: false
        upsize: true
        setFromUnspecified: false
---
apiVersion: rightsizing.kubex.ai/v1alpha1
kind: StaticPolicy
metadata:
  name: sp-enablement-directions
  namespace: default
spec:
  scope:
    labelSelector:
      matchLabels:
        app: rightsizing-enablement-direction
  resources:
    containers:
      "*":
        requests:
          cpu: 500m
          memory: 512Mi
        limits:
          cpu: 800m
          memory: 1Gi
  automationStrategyRef:
    name: enablement-directions
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rightsizing-enablement-direction
  namespace: default
  labels:
    app: rightsizing-enablement-direction
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rightsizing-enablement-direction
  template:
    metadata:
      labels:
        app: rightsizing-enablement-direction
    spec:
      containers:
        - name: allow-directions
          image: busybox:1.37
          command: ["sleep", "3600"]
          resources:
            requests:
              cpu: 400m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
        - name: block-directions
          image: busybox:1.37
          command: ["sleep", "3600"]
          resources:
            requests:
              cpu: 600m
              memory: 256Mi
            limits:
              cpu: 700m
              memory: 2Gi
        - name: unset-resources
          image: busybox:1.37
          command: ["sleep", "3600"]
          resources: {}
