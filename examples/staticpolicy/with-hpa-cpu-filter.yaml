---
apiVersion: rightsizing.kubex.ai/v1alpha1
kind: AutomationStrategy
metadata:
  name: sample-hpa-cpu-filter
  namespace: default
spec: {}
---
apiVersion: rightsizing.kubex.ai/v1alpha1
kind: StaticPolicy
metadata:
  name: sample-rightsizing-policy-hpa-cpu-filter
  namespace: default
spec:
  scope:
    labelSelector:
      matchLabels:
        app: rightsizing-demo-hpa-cpu-filter
  resources:
    containers:
      "*":
        requests:
          cpu: 200m
          memory: 256Mi
        limits:
          cpu: 400m
          memory: 600Mi
  automationStrategyRef:
    name: sample-hpa-cpu-filter
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rightsizing-demo-hpa-cpu-filter
  namespace: default
  labels:
    app: rightsizing-demo-hpa-cpu-filter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rightsizing-demo-hpa-cpu-filter
  template:
    metadata:
      labels:
        app: rightsizing-demo-hpa-cpu-filter
    spec:
      containers:
        - name: demo
          image: busybox:1.36
          command: ["sleep", "3600"]
          resources:
            requests:
              cpu: 300m
              memory: 512Mi
            limits:
              cpu: 600m
              memory: 768Mi
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: rightsizing-demo-hpa-cpu-filter
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: rightsizing-demo-hpa-cpu-filter
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
