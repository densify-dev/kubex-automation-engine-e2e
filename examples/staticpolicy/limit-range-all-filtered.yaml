---
apiVersion: v1
kind: LimitRange
metadata:
  name: rightsizing-demo-limits
  namespace: default
spec:
  limits:
    - type: Container
      min:
        cpu: 250m
        memory: 512Mi
      max:
        cpu: 500m
        memory: 1Gi
---
apiVersion: rightsizing.kubex.ai/v1alpha1
kind: AutomationStrategy
metadata:
  name: limitrange-all-filtered-strategy
  namespace: default
spec:
  podEviction:
    enabled: false
---
apiVersion: rightsizing.kubex.ai/v1alpha1
kind: StaticPolicy
metadata:
  name: limitrange-all-filtered-policy
  namespace: default
spec:
  scope:
    labelSelector:
      matchLabels:
        app: limitrange-all-filtered
  resources:
    containers:
      "*":
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 2
          memory: 2Gi
  automationStrategyRef:
    name: limitrange-all-filtered-strategy
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: limitrange-all-filtered
  namespace: default
  labels:
    app: limitrange-all-filtered
spec:
  replicas: 1
  selector:
    matchLabels:
      app: limitrange-all-filtered
  template:
    metadata:
      labels:
        app: limitrange-all-filtered
    spec:
      containers:
        - name: demo
          image: busybox:1.36
          command: ["sleep", "3600"]
          resources:
            requests:
              cpu: 300m
              memory: 512Mi
            limits:
              cpu: 400m
              memory: 1Gi
