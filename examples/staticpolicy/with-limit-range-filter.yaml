---
apiVersion: v1
kind: LimitRange
metadata:
  name: rightsizing-demo-limits
  namespace: default
spec:
  limits:
    - type: Container
      min:
        cpu: 100m
        memory: 128Mi
      max:
        cpu: 500m
        memory: 512Mi
---
apiVersion: rightsizing.kubex.ai/v1alpha1
kind: AutomationStrategy
metadata:
  name: limitrange-automation-strategy
  namespace: default
spec:
  podEviction:
    enabled: false
---
apiVersion: rightsizing.kubex.ai/v1alpha1
kind: StaticPolicy
metadata:
  name: limitrange-static-policy
  namespace: default
spec:
  scope:
    labelSelector:
      matchLabels:
        app: limitrange-demo
  resources:
    containers:
      "*":
        requests:
          cpu: 150m
          memory: 64Mi
        limits:
          cpu: 1
          memory: 1Gi
  automationStrategyRef:
    name: limitrange-automation-strategy
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: limitrange-demo
  namespace: default
  labels:
    app: limitrange-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: limitrange-demo
  template:
    metadata:
      labels:
        app: limitrange-demo
    spec:
      containers:
        - name: demo
          image: busybox:1.36
          command: ["sleep", "3600"]
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 400m
              memory: 512Mi
