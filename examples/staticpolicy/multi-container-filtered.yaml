---
apiVersion: v1
kind: LimitRange
metadata:
  name: multi-container-limits
  namespace: default
spec:
  limits:
    - type: Container
      min:
        cpu: 100m
        memory: 128Mi
      max:
        cpu: 500m
        memory: 512Mi
---
apiVersion: rightsizing.kubex.ai/v1alpha1
kind: AutomationStrategy
metadata:
  name: multi-container-automation-strategy
  namespace: default
spec:
  podEviction:
    enabled: false
---
apiVersion: rightsizing.kubex.ai/v1alpha1
kind: StaticPolicy
metadata:
  name: multi-container-filtered-policy
  namespace: default
spec:
  scope:
    labelSelector:
      matchLabels:
        app: multi-container-filtered-demo
  resources:
    containers:
      "*":
        requests:
          cpu: 200m
          memory: 256Mi
        limits:
          cpu: 400m
          memory: 512Mi
      sidecar:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 600m
          memory: 512Mi
  automationStrategyRef:
    name: multi-container-automation-strategy
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: multi-container-filtered-demo
  namespace: default
  labels:
    app: multi-container-filtered-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: multi-container-filtered-demo
  template:
    metadata:
      labels:
        app: multi-container-filtered-demo
    spec:
      containers:
        - name: app
          image: busybox:1.36
          command: ["sleep", "3600"]
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
        - name: sidecar
          image: busybox:1.36
          command: ["sleep", "3600"]
