---
apiVersion: rightsizing.kubex.ai/v1alpha1
kind: AutomationStrategy
metadata:
  name: sample-automation-strategy-node-headroom
  namespace: default
spec:
  podEviction:
    enabled: false
  safetyChecks:
    requireNodeAllocatable: true
    # Percentage or quantity. Percentage applies to allocatable for that resource.
    nodeCpuHeadroom: "10%"
    nodeMemoryHeadroom: "31Gi"
---
apiVersion: rightsizing.kubex.ai/v1alpha1
kind: StaticPolicy
metadata:
  name: sample-rightsizing-policy-node-headroom
  namespace: default
spec:
  scope:
    labelSelector:
      matchLabels:
        app: rightsizing-demo-node-headroom
  resources:
    containers:
      "*":
        requests:
          cpu: 200m
          memory: 2256Mi
        limits:
          cpu: 400m
          memory: 3024Mi
  automationStrategyRef:
    name: sample-automation-strategy-node-headroom
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rightsizing-demo-node-headroom
  namespace: default
  labels:
    app: rightsizing-demo-node-headroom
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rightsizing-demo-node-headroom
  template:
    metadata:
      labels:
        app: rightsizing-demo-node-headroom
    spec:
      containers:
        - name: demo
          image: busybox:1.36
          command: ["sleep", "3600"]
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
