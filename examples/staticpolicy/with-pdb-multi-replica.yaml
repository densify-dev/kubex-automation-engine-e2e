---
apiVersion: rightsizing.kubex.ai/v1alpha1
kind: AutomationStrategy
metadata:
  name: pdb-resize-strategy
  namespace: default
spec:
  inPlaceResize:
    enabled: false
  podEviction:
    enabled: true
    retryPodDisruptionBudget: true
---
apiVersion: rightsizing.kubex.ai/v1alpha1
kind: StaticPolicy
metadata:
  name: pdb-multi-replica-policy
  namespace: default
spec:
  scope:
    labelSelector:
      matchLabels:
        app: pdb-resize-demo
    workloadTypes:
      - Deployment
  resources:
    containers:
      "*":
        requests:
          cpu: 400m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
  automationStrategyRef:
    name: pdb-resize-strategy
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: pdb-resize-demo
  namespace: default
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: pdb-resize-demo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pdb-resize-demo
  namespace: default
  labels:
    app: pdb-resize-demo
spec:
  replicas: 3
  selector:
    matchLabels:
      app: pdb-resize-demo
  template:
    metadata:
      labels:
        app: pdb-resize-demo
    spec:
      containers:
        - name: demo
          image: busybox:1.37
          command: ["sleep", "3600"]
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
