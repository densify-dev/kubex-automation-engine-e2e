---
# Example showing retainGuaranteedQOS keeping a Guaranteed pod aligned.
apiVersion: rightsizing.kubex.ai/v1alpha1
kind: AutomationStrategy
metadata:
  name: retain-guaranteed-qos
  namespace: default
spec:
  enablement:
    cpu:
      requests:
        upsize: true
        downsize: true
      limits:
        upsize: true
        downsize: true
    memory:
      requests:
        upsize: true
        downsize: true
      limits:
        upsize: true
        downsize: true
  safetyChecks:
    retainGuaranteedQOS: true

---
apiVersion: rightsizing.kubex.ai/v1alpha1
kind: StaticPolicy
metadata:
  name: retain-guaranteed-qos-policy
  namespace: default
spec:
  scope:
    labelSelector:
      matchLabels:
        app: retain-guaranteed-demo
  resources:
    containers:
      "*":
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 300m
          memory: 200Mi
  automationStrategyRef:
    name: retain-guaranteed-qos

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: retain-guaranteed-demo
  namespace: default
  labels:
    app: retain-guaranteed-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: retain-guaranteed-demo
  template:
    metadata:
      labels:
        app: retain-guaranteed-demo
    spec:
      containers:
        - name: demo
          image: busybox:1.36
          command: ["sleep", "3600"]
          resources:
            requests:
              cpu: 400m
              memory: 256Mi
            limits:
              cpu: 400m
              memory: 256Mi
