---
apiVersion: rightsizing.kubex.ai/v1alpha1
kind: AutomationStrategy
metadata:
  name: sample-automation-strategy
  namespace: default
spec:
  podEviction:
    enabled: false
---
apiVersion: rightsizing.kubex.ai/v1alpha1
kind: StaticPolicy
metadata:
  name: sample-rightsizing-policy
  namespace: default
spec:
  scope:
    workloadTypes:
      - CronJob
      - Job
    labelSelector:
      matchLabels:
        app: rightsizing-cronjob
  resources:
    containers:
      "*":
        requests:
          cpu: 200m
          memory: 256Mi
        limits:
          cpu: 400m
          memory: 512Mi
  automationStrategyRef:
    name: sample-automation-strategy
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: rightsizing-cronjob
  namespace: default
  labels:
    app: rightsizing-cronjob
spec:
  schedule: "* * * * *"
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: rightsizing-cronjob
        spec:
          containers:
            - name: demo
              image: busybox:1.36
              command: ["sleep", "30"]
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 200m
                  memory: 256Mi
          restartPolicy: OnFailure
