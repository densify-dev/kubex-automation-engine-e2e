---
apiVersion: v1
kind: LimitRange
metadata:
  name: rightsizing-pod-limits
  namespace: default
spec:
  limits:
    - type: Pod
      min:
        cpu: 100m
        memory: 128Mi
      max:
        cpu: "2"
        memory: 1Gi
---
apiVersion: rightsizing.kubex.ai/v1alpha1
kind: AutomationStrategy
metadata:
  name: pod-limitrange-automation-strategy
  namespace: default
spec:
  podEviction:
    enabled: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pod-limitrange-demo
  namespace: default
  labels:
    app: pod-limitrange-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pod-limitrange-demo
  template:
    metadata:
      labels:
        app: pod-limitrange-demo
    spec:
      containers:
        - name: demo-a
          image: busybox:1.37
          command: ["sleep", "3600"]
          resources:
            requests:
              cpu: 150m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
        - name: demo-b
          image: busybox:1.37
          command: ["sleep", "3600"]
          resources:
            requests:
              cpu: 150m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
---
apiVersion: rightsizing.kubex.ai/v1alpha1
kind: StaticPolicy
metadata:
  name: pod-limitrange-static-policy
  namespace: default
spec:
  scope:
    labelSelector:
      matchLabels:
        app: pod-limitrange-demo
  resources:
    containers:
      "*":
        requests:
          cpu: 20m
        limits:
          cpu: 400m
          memory: 2Gi
  automationStrategyRef:
    name: pod-limitrange-automation-strategy
