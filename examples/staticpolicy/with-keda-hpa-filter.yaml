---
apiVersion: rightsizing.kubex.ai/v1alpha1
kind: AutomationStrategy
metadata:
  name: sample-keda-hpa-filter
  namespace: default
spec: {}
---
apiVersion: rightsizing.kubex.ai/v1alpha1
kind: StaticPolicy
metadata:
  name: sample-rightsizing-policy-keda-hpa-filter
  namespace: default
spec:
  scope:
    labelSelector:
      matchLabels:
        app: rightsizing-demo-keda-hpa-filter
  resources:
    containers:
      "*":
        requests:
          cpu: 200m
          memory: 256Mi
        limits:
          cpu: 400m
          memory: 512Mi
  automationStrategyRef:
    name: sample-keda-hpa-filter
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rightsizing-demo-keda-hpa-filter
  namespace: default
  labels:
    app: rightsizing-demo-keda-hpa-filter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rightsizing-demo-keda-hpa-filter
  template:
    metadata:
      labels:
        app: rightsizing-demo-keda-hpa-filter
    spec:
      containers:
        - name: demo
          image: busybox:1.36
          command: ["sleep", "3600"]
          resources:
            requests:
              cpu: 500m
              memory: 768Mi
            limits:
              cpu: 700m
              memory: 1Gi
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: rightsizing-demo-keda-hpa-filter
  namespace: default
spec:
  scaleTargetRef:
    name: rightsizing-demo-keda-hpa-filter
  minReplicaCount: 1
  maxReplicaCount: 5
  triggers:
    - type: cron
      metadata:
        timezone: UTC
        start: "0 0 * * *"
        end: "59 23 * * *"
        desiredReplicas: "2"
