apiVersion: rightsizing.kubex.ai/v1alpha1
kind: AutomationStrategy
metadata:
  name: memory-downsize-fallback-strategy
  namespace: default
spec:
  inPlaceResize:
    enabled: true
    containerRestart: false
  podEviction:
    enabled: true
  safetyChecks:
    minReadyDuration: 0s
    minMemoryChangePercent: 0
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: non-memory-api-rejection-demo
  namespace: default
  labels:
    app: non-memory-api-rejection-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: non-memory-api-rejection-demo
  template:
    metadata:
      labels:
        app: non-memory-api-rejection-demo
    spec:
      containers:
      - name: app
        image: busybox:1.36
        command: ["sh", "-c", "sleep 3600"]
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 100m
            memory: 256Mi
---
apiVersion: rightsizing.kubex.ai/v1alpha1
kind: StaticPolicy
metadata:
  name: non-memory-api-rejection-policy
  namespace: default
spec:
  scope:
    labelSelector:
      matchLabels:
        app: non-memory-api-rejection-demo
  resources:
    containers:
      "*":
        requests:
          ephemeral-storage: 1Gi
        limits:
          ephemeral-storage: 1Gi
  automationStrategyRef:
    name: memory-downsize-fallback-strategy
