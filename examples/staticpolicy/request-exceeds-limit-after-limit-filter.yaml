---
apiVersion: v1
kind: LimitRange
metadata:
  name: request-limit-mismatch-pod-limits
  namespace: default
spec:
  limits:
    - type: Pod
      max:
        cpu: 600m
---
apiVersion: rightsizing.kubex.ai/v1alpha1
kind: AutomationStrategy
metadata:
  name: request-limit-mismatch-strategy
  namespace: default
spec:
  # Keep this enabled so the example reproduces "limit action filtered out".
  safetyChecks:
    enablePodLimitRangeFilter: true
---
apiVersion: rightsizing.kubex.ai/v1alpha1
kind: StaticPolicy
metadata:
  name: request-limit-mismatch-policy
  namespace: default
spec:
  scope:
    labelSelector:
      matchLabels:
        app: request-limit-mismatch-demo
  resources:
    containers:
      "*":
        requests:
          cpu: 300m
        limits:
          cpu: 700m
  automationStrategyRef:
    name: request-limit-mismatch-strategy
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: request-limit-mismatch-demo
  namespace: default
  labels:
    app: request-limit-mismatch-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: request-limit-mismatch-demo
  template:
    metadata:
      labels:
        app: request-limit-mismatch-demo
    spec:
      containers:
        - name: app
          image: busybox:1.37
          command: ["sleep", "3600"]
          resources:
            requests:
              cpu: 100m
            limits:
              cpu: 200m

