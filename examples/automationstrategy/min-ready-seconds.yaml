---
apiVersion: v1
kind: Namespace
metadata:
  name: automationstrategy-ready
---
apiVersion: rightsizing.kubex.ai/v1alpha1
kind: AutomationStrategy
metadata:
  name: min-ready-strategy
  namespace: automationstrategy-ready
spec:
  safetyChecks:
    minReadyDuration: 1m
---
apiVersion: rightsizing.kubex.ai/v1alpha1
kind: StaticPolicy
metadata:
  name: min-ready-policy
  namespace: automationstrategy-ready
spec:
  scope:
    labelSelector:
      matchLabels:
        app: min-ready-demo
  resources:
    containers:
      "*":
        requests:
          cpu: 300m
          memory: 384Mi
        limits:
          cpu: 800m
          memory: 768Mi
  automationStrategyRef:
    name: min-ready-strategy
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: min-ready-demo
  namespace: automationstrategy-ready
  labels:
    app: min-ready-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: min-ready-demo
  template:
    metadata:
      labels:
        app: min-ready-demo
    spec:
      containers:
        - name: app
          image: busybox:1.37
          command: ["sleep", "3600"]
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 400m
              memory: 512Mi
