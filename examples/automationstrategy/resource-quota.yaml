---
apiVersion: v1
kind: Namespace
metadata:
  name: automationstrategy-quota
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: rightsizing-quota
  namespace: automationstrategy-quota
spec:
  hard:
    requests.cpu: "500m"
    requests.memory: "512Mi"
    limits.cpu: "1"
    limits.memory: "1Gi"
---
apiVersion: rightsizing.kubex.ai/v1alpha1
kind: AutomationStrategy
metadata:
  name: quota-strategy
  namespace: automationstrategy-quota
spec:
  safetyChecks:
    enableResourceQuotaFilter: true
---
apiVersion: rightsizing.kubex.ai/v1alpha1
kind: StaticPolicy
metadata:
  name: quota-policy
  namespace: automationstrategy-quota
spec:
  scope:
    labelSelector:
      matchLabels:
        app: quota-demo
  resources:
    containers:
      "*":
        requests:
          cpu: 750m
          memory: 768Mi
        limits:
          cpu: "1500m"
          memory: 1536Mi
  automationStrategyRef:
    name: quota-strategy
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: quota-demo
  namespace: automationstrategy-quota
  labels:
    app: quota-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: quota-demo
  template:
    metadata:
      labels:
        app: quota-demo
    spec:
      containers:
        - name: app
          image: busybox:1.37
          command: ["sleep", "3600"]
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 400m
              memory: 512Mi
