---
apiVersion: v1
kind: Namespace
metadata:
  name: automationstrategy-vpa-explicit
---
apiVersion: rightsizing.kubex.ai/v1alpha1
kind: AutomationStrategy
metadata:
  name: vpa-strategy
  namespace: automationstrategy-vpa-explicit
spec:
  safetyChecks:
    enableVpaFilter: true
---
apiVersion: rightsizing.kubex.ai/v1alpha1
kind: StaticPolicy
metadata:
  name: vpa-policy
  namespace: automationstrategy-vpa-explicit
spec:
  scope:
    labelSelector:
      matchLabels:
        app: vpa-demo
  resources:
    containers:
      "*":
        requests:
          cpu: 300m
          memory: 384Mi
        limits:
          cpu: 800m
          memory: 768Mi
  automationStrategyRef:
    name: vpa-strategy
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vpa-demo
  namespace: automationstrategy-vpa-explicit
  labels:
    app: vpa-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vpa-demo
  template:
    metadata:
      labels:
        app: vpa-demo
    spec:
      containers:
        - name: argos-node
          image: busybox:1.36
          command: ["sleep", "3600"]
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 400m
              memory: 512Mi
        - name: argos-lob-feeder
          image: busybox:1.36
          command: ["sleep", "3600"]
          resources:
            requests:
              cpu: 150m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
        - name: other
          image: busybox:1.36
          command: ["sleep", "3600"]
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: vpa-demo
  namespace: automationstrategy-vpa-explicit
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: vpa-demo
  updatePolicy:
    updateMode: Auto
  resourcePolicy:
    containerPolicies:
      - containerName: "*"
        mode: "Off"
      - containerName: argos-lob-feeder
        controlledResources: ["cpu", "memory"]
        minAllowed:
          cpu: 1m
          memory: 1Mi
        maxAllowed:
          cpu: 1
          memory: 10Gi
      - containerName: argos-node
        controlledResources: ["cpu", "memory"]
        minAllowed:
          cpu: 1m
          memory: 1Mi
        maxAllowed:
          cpu: 1
          memory: 10Gi
