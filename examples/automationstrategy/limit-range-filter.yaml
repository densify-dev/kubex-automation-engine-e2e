---
apiVersion: v1
kind: Namespace
metadata:
  name: automationstrategy-limitrange
---
apiVersion: v1
kind: LimitRange
metadata:
  name: container-limits
  namespace: automationstrategy-limitrange
spec:
  limits:
    - type: Container
      min:
        cpu: 100m
        memory: 100Mi
      max:
        cpu: "700m"
        memory: 900Mi
---
apiVersion: rightsizing.kubex.ai/v1alpha1
kind: AutomationStrategy
metadata:
  name: limitrange-strategy
  namespace: automationstrategy-limitrange
spec:
  safetyChecks:
    enableLimitRangeFilter: true
---
apiVersion: rightsizing.kubex.ai/v1alpha1
kind: StaticPolicy
metadata:
  name: limitrange-policy
  namespace: automationstrategy-limitrange
spec:
  scope:
    labelSelector:
      matchLabels:
        app: limitrange-demo
  resources:
    containers:
      "*":
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: "800m"
          memory: 1024Mi
  automationStrategyRef:
    name: limitrange-strategy
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: limitrange-demo
  namespace: automationstrategy-limitrange
  labels:
    app: limitrange-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: limitrange-demo
  template:
    metadata:
      labels:
        app: limitrange-demo
    spec:
      containers:
        - name: app
          image: busybox:1.36
          command: ["sleep", "3600"]
          resources:
            requests:
              cpu: 300m
              memory: 384Mi
            limits:
              cpu: 600m
              memory: 768Mi
