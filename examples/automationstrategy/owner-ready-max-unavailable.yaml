---
apiVersion: v1
kind: Namespace
metadata:
  name: automationstrategy-owner
---
apiVersion: rightsizing.kubex.ai/v1alpha1
kind: AutomationStrategy
metadata:
  name: owner-ready-strategy
  namespace: automationstrategy-owner
spec:
  inPlaceResize:
    enabled: false
  safetyChecks:
    requireOwnerPodsReady: true
    respectWorkloadMaxUnavailable: true
    resizeRetryInterval: 30s
---
apiVersion: rightsizing.kubex.ai/v1alpha1
kind: StaticPolicy
metadata:
  name: owner-ready-policy
  namespace: automationstrategy-owner
spec:
  scope:
    labelSelector:
      matchLabels:
        app: owner-ready-demo
  resources:
    containers:
      "*":
        requests:
          cpu: 250m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
  automationStrategyRef:
    name: owner-ready-strategy
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: owner-ready-demo
  namespace: automationstrategy-owner
  labels:
    app: owner-ready-demo
spec:
  replicas: 4
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: owner-ready-demo
  template:
    metadata:
      labels:
        app: owner-ready-demo
    spec:
      containers:
        - name: app
          image: busybox:1.36
          command: ["sleep", "3600"]
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
