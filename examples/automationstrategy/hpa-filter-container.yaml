---
apiVersion: v1
kind: Namespace
metadata:
  name: automationstrategy-hpa-container
---
apiVersion: rightsizing.kubex.ai/v1alpha1
kind: AutomationStrategy
metadata:
  name: hpa-container-strategy
  namespace: automationstrategy-hpa-container
spec:
  safetyChecks:
    enableHpaFilter: true
---
apiVersion: rightsizing.kubex.ai/v1alpha1
kind: StaticPolicy
metadata:
  name: hpa-container-policy
  namespace: automationstrategy-hpa-container
spec:
  scope:
    labelSelector:
      matchLabels:
        app: hpa-container-demo
  resources:
    containers:
      "*":
        requests:
          cpu: 300m
          memory: 384Mi
        limits:
          cpu: 800m
          memory: 768Mi
  automationStrategyRef:
    name: hpa-container-strategy
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hpa-container-demo
  namespace: automationstrategy-hpa-container
  labels:
    app: hpa-container-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hpa-container-demo
  template:
    metadata:
      labels:
        app: hpa-container-demo
    spec:
      containers:
        - name: app
          image: busybox:1.37
          command: ["sleep", "3600"]
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 400m
              memory: 512Mi
        - name: sidecar
          image: busybox:1.37
          command: ["sleep", "3600"]
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 150m
              memory: 128Mi
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: hpa-container-demo
  namespace: automationstrategy-hpa-container
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: hpa-container-demo
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: ContainerResource
      containerResource:
        name: cpu
        container: app
        target:
          type: Utilization
          averageUtilization: 60
