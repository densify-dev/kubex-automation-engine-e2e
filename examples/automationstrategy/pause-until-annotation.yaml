---
apiVersion: v1
kind: Namespace
metadata:
  name: automationstrategy-pause
---
apiVersion: rightsizing.kubex.ai/v1alpha1
kind: AutomationStrategy
metadata:
  name: pause-until-strategy
  namespace: automationstrategy-pause
spec:
  safetyChecks:
    enablePauseUntilAnnotationCheck: true
---
apiVersion: rightsizing.kubex.ai/v1alpha1
kind: StaticPolicy
metadata:
  name: pause-until-policy
  namespace: automationstrategy-pause
spec:
  scope:
    labelSelector:
      matchLabels:
        app: pause-until-demo
  resources:
    containers:
      "*":
        requests:
          cpu: 250m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
  automationStrategyRef:
    name: pause-until-strategy
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pause-until-demo
  namespace: automationstrategy-pause
  labels:
    app: pause-until-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pause-until-demo
  template:
    metadata:
      labels:
        app: pause-until-demo
      annotations:
        rightsizing.kubex.ai/pause-until: "infinite"
    spec:
      containers:
        - name: app
          image: busybox:1.37
          command: ["sleep", "3600"]
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
