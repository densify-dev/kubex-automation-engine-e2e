---
apiVersion: v1
kind: Namespace
metadata:
  name: automationstrategy-minchange
---
apiVersion: rightsizing.kubex.ai/v1alpha1
kind: AutomationStrategy
metadata:
  name: min-change-strategy
  namespace: automationstrategy-minchange
spec:
  safetyChecks:
    minCpuChangePercent: 20
    minMemoryChangePercent: 25
---
apiVersion: rightsizing.kubex.ai/v1alpha1
kind: StaticPolicy
metadata:
  name: min-change-policy
  namespace: automationstrategy-minchange
spec:
  scope:
    labelSelector:
      matchLabels:
        app: min-change-demo
  resources:
    containers:
      "*":
        requests:
          cpu: 220m
          memory: 288Mi
        limits:
          cpu: 440m
          memory: 576Mi
  automationStrategyRef:
    name: min-change-strategy
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: min-change-demo
  namespace: automationstrategy-minchange
  labels:
    app: min-change-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: min-change-demo
  template:
    metadata:
      labels:
        app: min-change-demo
    spec:
      containers:
        - name: app
          image: busybox:1.36
          command: ["sleep", "3600"]
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 400m
              memory: 512Mi
