---
apiVersion: v1
kind: Namespace
metadata:
  name: automationstrategy-node
---
apiVersion: rightsizing.kubex.ai/v1alpha1
kind: AutomationStrategy
metadata:
  name: node-allocatable-strategy
  namespace: automationstrategy-node
spec:
  safetyChecks:
    requireNodeAllocatable: true
    nodeCpuHeadroom: 50%
    nodeMemoryHeadroom: 4Gi
    resizeRetryInterval: 45s
---
apiVersion: rightsizing.kubex.ai/v1alpha1
kind: StaticPolicy
metadata:
  name: node-allocatable-policy
  namespace: automationstrategy-node
spec:
  scope:
    labelSelector:
      matchLabels:
        app: node-allocatable-demo
  resources:
    containers:
      "*":
        requests:
          cpu: "8"
          memory: 16Gi
        limits:
          cpu: "12"
          memory: 24Gi
  automationStrategyRef:
    name: node-allocatable-strategy
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-allocatable-demo
  namespace: automationstrategy-node
  labels:
    app: node-allocatable-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: node-allocatable-demo
  template:
    metadata:
      labels:
        app: node-allocatable-demo
    spec:
      containers:
        - name: app
          image: busybox:1.36
          command: ["sleep", "3600"]
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
