---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qos-change-demo
  namespace: default
  labels:
    app: qos-change-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qos-change-demo
  template:
    metadata:
      labels:
        app: qos-change-demo
    spec:
      containers:
        - name: app
          image: busybox:1.36
          command: ["sh", "-c", "sleep 3600"]
